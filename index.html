    function getWeekKey() {
      const now = new Date();
      const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    }

    function getTodayName() {
      const names = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      return names[new Date().getDay()];
    }

    function getCurrentMinutes() {
      const n = new Date();
      return n.getHours() * 60 + n.getMinutes();
    }

    // Map a day name to its ISO date string within the current week
    function getDateForDay(dayName) {
      const today = new Date();
      const todayDow = today.getDay();
      const names = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const targetDow = names.indexOf(dayName);
      const diff = targetDow - todayDow;
      const d = new Date(today);
      d.setDate(today.getDate() + diff);
      return d.toISOString().slice(0, 10);
    }

    function parseTimePart(s) {
      const m = s.trim().match(/^(\d+):(\d+)(am|pm)?$/i);
      if (!m) return null;
      let h = parseInt(m[1]);
      const min = parseInt(m[2]);
      const mer = m[3] ? m[3].toLowerCase() : null;
      if (mer === 'am') {
        if (h === 12) h = 0;
      } else if (mer === 'pm') {
        if (h !== 12) h += 12;
      } else {
        if (h !== 11) h += 12;
      }
      return h * 60 + min;
    }

    function parseBlockTime(timeRange) {
      const parts = timeRange.split('–').map(s => s.trim());
      if (parts.length !== 2) return null;
      const start = parseTimePart(parts[0]);
      const end = parseTimePart(parts[1]);
      if (start === null || end === null || end <= start) return null;
      return { start, end, duration: (end - start) / 60 };
    }

    // Convert ISO week key (e.g. "2026-W12") to a Date for that Monday
    function weekKeyToMonday(weekKey) {
      const [yearStr, weekStr] = weekKey.split('-W');
      const year = parseInt(yearStr), week = parseInt(weekStr);
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4dow = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4dow - 1) + (week - 1) * 7);
      return monday;
    }

    function weekKeyToLabel(weekKey) {
      const monday = weekKeyToMonday(weekKey);
      return monday.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
    }

    // Compute weekly summary from raw checks + overrides (used for history archival)
    function computeWeekSummary(weekKey, checksData, overridesData) {
      const monday = weekKeyToMonday(weekKey);
      const hours = {};
      legend.forEach(cat => hours[cat] = 0);
      let blocksCompleted = 0, totalBlocks = 0;
      days.forEach((dayName, dayIdx) => {
        const dayDate = new Date(monday);
        dayDate.setUTCDate(monday.getUTCDate() + dayIdx);
        const dateStr = dayDate.toISOString().slice(0, 10);
        schedule[dayName].blocks.forEach((block, i) => {
          if (block.category === 'break') return;
          totalBlocks++;
          if (checksData && checksData[`${dayName}-${i}`]) {
            blocksCompleted++;
            const ov = overridesData && overridesData[`${dateStr}-${i}`];
            const effectiveCat = ov ? ov.category : block.category;
            const t = parseBlockTime(block.time);
            if (t && hours[effectiveCat] !== undefined) hours[effectiveCat] += t.duration;
          }
        });
      });
      return { weekOf: weekKeyToLabel(weekKey), hours, blocksCompleted, totalBlocks };
    }

    // ── Override Modal ────────────────────────────────────────────────────────

    function OverrideModal({ block, dayName, idx, overrides, onApply, onReset, onClose }) {
      const [showMisc, setShowMisc] = useState(false);
      const [miscText, setMiscText] = useState('');
      const inputRef = useRef(null);
      const overrideKey = `${getDateForDay(dayName)}-${idx}`;
      const hasOverride = !!overrides[overrideKey];

      useEffect(() => {
        if (showMisc && inputRef.current) inputRef.current.focus();
      }, [showMisc]);

      function handleCatClick(cat) {
        if (cat === 'misc') {
          setShowMisc(true);
        } else {
          onApply(dayName, idx, cat, '');
        }
      }

      function handleMiscSave() {
        if (miscText.trim()) onApply(dayName, idx, 'misc', miscText.trim());
      }

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>

            {/* Header */}
            <p style={{ color: '#71717a', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '4px', fontFamily: 'monospace' }}>
              Swap this block?
            </p>
            <p style={{ color: '#f4f4f5', fontWeight: 600, fontSize: '16px', marginBottom: '2px' }}>
              {block.activity}
            </p>
            <p style={{ color: '#52525b', fontSize: '12px', fontFamily: 'monospace', marginBottom: '1.25rem' }}>
              {block.time}
            </p>

            {/* Category grid */}
            {!showMisc && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', marginBottom: '12px' }}>
                {overrideCats.map(cat => {
                  const hex = categoryAccentHex[cat];
                  const label = cat === 'misc' ? 'Misc / Other…' : categoryLabels[cat];
                  return (
                    <button
                      key={cat}
                      className="modal-cat-btn"
                      onClick={() => handleCatClick(cat)}
                      style={{
                        border: `1px solid ${hex}40`,
                        background: `${hex}12`,
                        color: hex,
                      }}
                    >
                      {label}
                    </button>
                  );
                })}
              </div>
            )}

            {/* Misc text input */}
            {showMisc && (
              <div style={{ marginBottom: '12px' }}>
                <p style={{ color: '#a1a1aa', fontSize: '13px', marginBottom: '4px' }}>What did you actually do?</p>
                <input
                  ref={inputRef}
                  type="text"
                  className="modal-misc-input"
                  placeholder="e.g. Networking calls, errands, phone screen…"
                  value={miscText}
                  onChange={e => setMiscText(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') handleMiscSave(); if (e.key === 'Escape') setShowMisc(false); }}
                />
                <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                  <button
                    className="modal-action-btn"
                    onClick={() => setShowMisc(false)}
                  >
                    ← Back
                  </button>
                  <button
                    onClick={handleMiscSave}
                    disabled={!miscText.trim()}
                    style={{
                      flex: 1, padding: '9px', borderRadius: '8px',
                      background: miscText.trim() ? '#a1a1aa' : '#27272a',
                      color: miscText.trim() ? '#09090b' : '#52525b',
                      fontWeight: 700, fontSize: '13px',
                      cursor: miscText.trim() ? 'pointer' : 'default',
                      border: 'none', fontFamily: 'Georgia, serif',
                      transition: 'all 0.15s ease',
                    }}
                  >
                    Save
                  </button>
                </div>
              </div>
            )}

            {/* Footer actions */}
            {!showMisc && (
              <div style={{ display: 'flex', gap: '8px' }}>
                {hasOverride && (
                  <button className="modal-action-btn" onClick={() => onReset(dayName, idx)}>
                    Reset to original
                  </button>
                )}
                <button className="modal-action-btn" onClick={onClose}>
                  Cancel
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const todayName = getTodayName();
      const weekKey = getWeekKey();

      const [activeDay, setActiveDay] = useState(todayName);
      const [nowMinutes, setNowMinutes] = useState(getCurrentMinutes());

      const [checks, setChecks] = useState(() => {
        try {
          const s = localStorage.getItem(`schedule-v1-${weekKey}`);
          return s ? JSON.parse(s) : {};
        } catch { return {}; }
      });

      // Overrides keyed by "{date}-{blockIdx}", e.g. "2026-03-18-0"
      const [overrides, setOverrides] = useState(() => {
        try {
          const s = localStorage.getItem('schedule-overrides-v1');
          return s ? JSON.parse(s) : {};
        } catch { return {}; }
      });

      const [editingBlock, setEditingBlock] = useState(null); // { day, idx }

      const [history, setHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('schedule-history-v1') || '{}'); }
        catch { return {}; }
      });
      const [syncStatus, setSyncStatus] = useState(JSONBIN_BIN_ID ? 'loading' : 'unconfigured');
      const syncTimerRef = useRef(null);

      useEffect(() => {
        const id = setInterval(() => setNowMinutes(getCurrentMinutes()), 60000);
        return () => clearInterval(id);
      }, []);

      // Fetch remote on mount — detect week rollover, merge state
      useEffect(() => {
        if (!JSONBIN_BIN_ID) return;
        fetchRemote().then(remote => {
          if (!remote) { setSyncStatus('offline'); return; }
          let updatedChecks   = remote.checks   || {};
          let updatedOverrides = remote.overrides || {};
          let updatedHistory  = remote.history  || {};
          // Week rolled over since last device synced — archive old week
          if (remote.weekKey && remote.weekKey !== weekKey) {
            const summary = computeWeekSummary(remote.weekKey, remote.checks, remote.overrides);
            updatedHistory = { ...updatedHistory, [remote.weekKey]: summary };
            updatedChecks = {};
            pushRemote({ weekKey, checks: updatedChecks, overrides: updatedOverrides, history: updatedHistory });
          }
          setChecks(updatedChecks);
          setOverrides(updatedOverrides);
          setHistory(updatedHistory);
          setSyncStatus('synced');
          try {
            localStorage.setItem(`schedule-v1-${weekKey}`, JSON.stringify(updatedChecks));
            localStorage.setItem('schedule-overrides-v1', JSON.stringify(updatedOverrides));
            localStorage.setItem('schedule-history-v1', JSON.stringify(updatedHistory));
          } catch {}
        }).catch(() => setSyncStatus('offline'));
      }, []);

      function schedulePush(newChecks, newOverrides, newHistory) {
        if (!JSONBIN_BIN_ID) return;
        if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
        setSyncStatus('syncing');
        syncTimerRef.current = setTimeout(async () => {
          try {
            await pushRemote({ weekKey, checks: newChecks, overrides: newOverrides, history: newHistory });
            setSyncStatus('synced');
          } catch { setSyncStatus('error'); }
        }, 2000);
      }

      function toggleCheck(day, idx) {
        const key = `${day}-${idx}`;
        const next = { ...checks };
        if (next[key]) { delete next[key]; } else { next[key] = true; }
        setChecks(next);
        try { localStorage.setItem(`schedule-v1-${weekKey}`, JSON.stringify(next)); } catch {}
        schedulePush(next, overrides, history);
      }

      function applyOverride(dayName, idx, category, customText) {
        const key = `${getDateForDay(dayName)}-${idx}`;
        const next = { ...overrides, [key]: { category, custom: customText } };
        setOverrides(next);
        try { localStorage.setItem('schedule-overrides-v1', JSON.stringify(next)); } catch {}
        setEditingBlock(null);
        schedulePush(checks, next, history);
      }

      function resetOverride(dayName, idx) {
        const key = `${getDateForDay(dayName)}-${idx}`;
        const next = { ...overrides };
        delete next[key];
        setOverrides(next);
        try { localStorage.setItem('schedule-overrides-v1', JSON.stringify(next)); } catch {}
        setEditingBlock(null);
        schedulePush(checks, next, history);
      }

      // Returns the block as it should be displayed (with override applied)
      function getEffectiveBlock(dayName, block, idx) {
        const key = `${getDateForDay(dayName)}-${idx}`;
        const ov = overrides[key];
        if (!ov) return { ...block, isOverridden: false };
        return {
          ...block,
          category: ov.category,
          activity: ov.category === 'misc'
            ? (ov.custom || 'Misc')
            : categoryLabels[ov.category],
          detail: ov.custom || (ov.category === 'misc' ? '' : block.detail),
          isOverridden: true,
          originalActivity: block.activity,
        };
      }

      function getActualHours() {
        const actual = {};
        legend.forEach(cat => actual[cat] = 0);
        days.forEach(day => {
          schedule[day].blocks.forEach((block, i) => {
            if (checks[`${day}-${i}`] && block.category !== 'break') {
              const effective = getEffectiveBlock(day, block, i);
              const t = parseBlockTime(block.time);
              if (t && actual[effective.category] !== undefined) {
                actual[effective.category] += t.duration;
              }
            }
          });
        });
        return actual;
      }

      const actualHours = getActualHours();
      const day = schedule[activeDay];
      const totalBlocks = days.reduce((sum, d) =>
        sum + schedule[d].blocks.filter(b => b.category !== 'break').length, 0);
      const completedBlocks = Object.keys(checks).length;

      return (
        <div className="min-h-screen bg-zinc-950 p-6">

          {/* Header */}
          <div className="max-w-3xl mx-auto mb-10">
            <p className="text-zinc-500 text-xs tracking-widest uppercase mb-1">Weekly Structure</p>
            <h1 className="text-4xl font-bold text-zinc-100 mb-1">Adi's Schedule</h1>
            <p className="text-zinc-400 text-base">Pre-April LSAT · Active Job Search · 11am – 11pm</p>
            <div className="flex flex-wrap gap-3 mt-5">
              {legend.map(cat => (
                <div key={cat} className="flex items-center gap-1.5">
                  <div className={`w-2\.5 h-2\.5 rounded-full ${categoryColors[cat].accent}`} />
                  <span className="text-zinc-400 text-xs tracking-wide">{categoryLabels[cat]}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Day Tabs + Sync Indicator */}
          <div className="max-w-3xl mx-auto mb-8">
            <div className="flex flex-wrap gap-1 items-center">
              {days.map(d => (
                <button
                  key={d}
                  onClick={() => setActiveDay(d)}
                  className={`px-3 py-1\.5 text-sm rounded transition-all ${activeDay === d ? "active-day" : "inactive-day"}`}
                  style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', lineHeight: '1.4' }}
                >
                  {d.slice(0, 3)}
                  {d === todayName && (
                    <span style={{
                      display: 'block', width: '4px', height: '4px', borderRadius: '50%',
                      background: activeDay === d ? '#71717a' : '#fbbf24',
                      margin: '3px auto 0',
                    }} />
                  )}
                </button>
              ))}
              <button
                onClick={() => setActiveDay('History')}
                className={`px-3 py-1\.5 text-sm rounded transition-all ${activeDay === 'History' ? "active-day" : "inactive-day"}`}
              >
                Hist
              </button>
              <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center' }}>
                {syncStatus === 'unconfigured' && <span style={{ fontSize: '10px', color: '#3f3f46', fontFamily: 'monospace' }}>sync off</span>}
                {syncStatus === 'loading'      && <span style={{ fontSize: '10px', color: '#71717a', fontFamily: 'monospace' }}>⊙ loading</span>}
                {syncStatus === 'syncing'      && <span style={{ fontSize: '10px', color: '#fbbf24', fontFamily: 'monospace' }}>⊙ syncing…</span>}
                {syncStatus === 'synced'       && <span style={{ fontSize: '10px', color: '#34d399', fontFamily: 'monospace' }}>✓ synced</span>}
                {syncStatus === 'offline'      && <span style={{ fontSize: '10px', color: '#71717a', fontFamily: 'monospace' }}>○ offline</span>}
                {syncStatus === 'error'        && <span style={{ fontSize: '10px', color: '#fb7185', fontFamily: 'monospace' }}>✗ error</span>}
              </div>
            </div>
          </div>

          {/* History View */}
          {activeDay === 'History' && (
            <div className="max-w-3xl mx-auto">
              <div className="mb-6">
                <h2 className="text-2xl font-bold text-zinc-100">History</h2>
                <p className="text-zinc-500 text-sm mt-0\.5 italic">Past weeks' completion</p>
              </div>
              {Object.keys(history).length === 0 ? (
                <p className="text-zinc-500 text-sm italic">No history yet — complete your first week to see it here.</p>
              ) : (
                <div className="space-y-3">
                  {Object.keys(history).sort().reverse().map(wk => {
                    const s = history[wk];
                    return (
                      <div key={wk} className="rounded-lg border border-zinc-800 bg-zinc-900 px-5 py-4">
                        <div className="flex items-baseline justify-between mb-4">
                          <p className="text-zinc-100 font-semibold text-base">Week of {s.weekOf}</p>
                          <p className="text-zinc-500 text-xs font-mono">{s.blocksCompleted} / {s.totalBlocks} blocks</p>
                        </div>
                        <div className="grid grid-cols-2 md-grid-cols-6 gap-3">
                          {legend.map(cat => {
                            const c = categoryColors[cat];
                            const hex = categoryAccentHex[cat];
                            const actual = Math.round((s.hours[cat] || 0) * 10) / 10;
                            const target = weeklyTargets[cat];
                            const pct = Math.min(actual / target, 1);
                            return (
                              <div key={cat} className={`rounded border ${c.border} ${c.bg} px-3 py-2`}>
                                <p className={`text-xs font-semibold ${c.text} mb-1`}>{categoryLabels[cat]}</p>
                                <p className="text-zinc-300 text-sm font-mono">
                                  {actual} <span className="text-zinc-600">/ {target} hrs</span>
                                </p>
                                <div className="progress-track">
                                  <div className="progress-fill" style={{ width: `${pct * 100}%`, background: hex }} />
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Day View */}
          {activeDay !== 'History' && <div className="max-w-3xl mx-auto">
            <div className="mb-6">
              <h2 className="text-2xl font-bold text-zinc-100">
                {activeDay}
                {activeDay === todayName && (
                  <span style={{
                    fontSize: '11px', fontWeight: 400, color: '#71717a',
                    marginLeft: '10px', fontFamily: 'monospace',
                    textTransform: 'uppercase', letterSpacing: '0.06em',
                  }}>today</span>
                )}
              </h2>
              <p className="text-zinc-500 text-sm mt-0\.5 italic">{day.theme}</p>
            </div>

            <div className="space-y-3">
              {day.blocks.map((block, i) => {
                const effective = getEffectiveBlock(activeDay, block, i);
                const c = categoryColors[effective.category];
                const hex = categoryAccentHex[effective.category];
                const isChecked = !!checks[`${activeDay}-${i}`];
                const blockTime = parseBlockTime(block.time);
                const isNow = activeDay === todayName
                  && blockTime
                  && nowMinutes >= blockTime.start
                  && nowMinutes < blockTime.end;
                const isBreak = block.category === 'break' && !effective.isOverridden;

                return (
                  <div
                    key={i}
                    className={`block-card rounded-lg border ${c.border} ${c.bg} px-5 py-4 flex items-start gap-4`}
                    onClick={() => !isBreak && setEditingBlock({ day: activeDay, idx: i })}
                    style={{
                      opacity: isChecked ? 0.42 : 1,
                      boxShadow: isNow ? `0 0 0 1px ${hex}70, inset 0 0 40px ${hex}0a` : 'none',
                      cursor: isBreak ? 'default' : 'pointer',
                    }}
                  >
                    {/* Category dot */}
                    <div className="mt-1\.5 flex-shrink-0">
                      <div className={`w-2 h-2 rounded-full ${c.accent}`} />
                    </div>

                    {/* Content */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-baseline justify-between gap-2 flex-wrap">
                        <span
                          className={`text-base font-semibold ${c.text}`}
                          style={{
                            textDecoration: isChecked ? 'line-through' : 'none',
                            textDecorationColor: 'rgba(255,255,255,0.25)',
                          }}
                        >
                          {effective.activity}
                          {isNow && (
                            <span className="now-badge" style={{ background: hex }}>NOW</span>
                          )}
                          {effective.isOverridden && (
                            <span style={{
                              fontSize: '10px', color: '#52525b', marginLeft: '8px',
                              fontFamily: 'monospace', fontWeight: 400,
                            }}>
                              ↺ was {effective.originalActivity}
                            </span>
                          )}
                        </span>
                        <span className="text-zinc-500 text-xs font-mono">{block.time}</span>
                      </div>
                      <p className="text-zinc-300 text-sm mt-0\.5">{effective.detail}</p>
                    </div>

                    {/* Check button */}
                    {!isBreak && (
                      <button
                        onClick={e => { e.stopPropagation(); toggleCheck(activeDay, i); }}
                        title={isChecked ? "Mark incomplete" : "Mark done"}
                        style={{
                          width: '24px', height: '24px', borderRadius: '50%',
                          flexShrink: 0, marginTop: '1px',
                          border: isChecked ? 'none' : '1.5px solid rgba(100,100,110,0.45)',
                          background: isChecked ? hex : 'transparent',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          transition: 'all 0.15s ease',
                          fontSize: '12px', color: '#09090b', fontWeight: 700, lineHeight: 1,
                        }}
                      >
                        {isChecked && '✓'}
                      </button>
                    )}
                  </div>
                );
              })}
            </div>

            {activeDay === "Saturday" && (
              <div className="mt-6 rounded-lg border border-amber-400-20 bg-amber-950-30 px-5 py-4">
                <p className="text-amber-300-80 text-sm italic">Saturday is the most important LSAT day of the week. Treat it like the real test — same time of day, no phone, no music. Review happens Sunday when you're fresh.</p>
              </div>
            )}
            {activeDay === "Sunday" && (
              <div className="mt-6 rounded-lg border border-zinc-700-40 bg-zinc-900 px-5 py-4">
                <p className="text-zinc-400 text-sm italic">Sunday does double duty — test review in the morning while it's fresh enough to be useful but distant enough to not feel brutal, then a proper weekly reset. The review and weekly planning are the two non-negotiables; everything else is flex.</p>
              </div>
            )}
          </div>}

          {/* Weekly Scoreboard */}
          <div className="max-w-3xl mx-auto mt-12 border-t border-zinc-800 pt-8">
            <div className="flex items-baseline justify-between mb-4">
              <p className="text-zinc-500 text-xs uppercase tracking-widest">This week's progress</p>
              <p className="text-zinc-600 text-xs font-mono">{completedBlocks} / {totalBlocks} blocks done</p>
            </div>
            <div className="grid grid-cols-2 md-grid-cols-6 gap-3">
              {legend.map(cat => {
                const c = categoryColors[cat];
                const hex = categoryAccentHex[cat];
                const actual = Math.round(actualHours[cat] * 10) / 10;
                const target = weeklyTargets[cat];
                const pct = Math.min(actual / target, 1);
                return (
                  <div key={cat} className={`rounded-lg border ${c.border} ${c.bg} px-4 py-3`}>
                    <p className={`text-xs font-semibold ${c.text} mb-1`}>{categoryLabels[cat]}</p>
                    <p className="text-zinc-300 text-sm font-mono">
                      {actual} <span className="text-zinc-600">/ {target} hrs</span>
                    </p>
                    <div className="progress-track">
                      <div className="progress-fill" style={{ width: `${pct * 100}%`, background: hex }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <p className="max-w-3xl mx-auto mt-8 text-zinc-600 text-xs">
            Tap any block to swap it out. Everything except Saturday's practice test is flexible — the structure matters more than the exact times.
          </p>

          {/* Override Modal */}
          {editingBlock && (
            <OverrideModal
              block={schedule[editingBlock.day].blocks[editingBlock.idx]}
              dayName={editingBlock.day}
              idx={editingBlock.idx}
              overrides={overrides}
              onApply={applyOverride}
              onReset={resetOverride}
              onClose={() => setEditingBlock(null)}
            />
          )}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
