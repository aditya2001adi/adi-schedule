    function getWeekKey() {
      const now = new Date();
      const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    }

    function getTodayName() {
      const names = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      return names[new Date().getDay()];
    }

    function getCurrentMinutes() {
      const n = new Date();
      return n.getHours() * 60 + n.getMinutes();
    }

    function getDateForDay(dayName) {
      const today = new Date();
      const todayDow = today.getDay();
      const names = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const targetDow = names.indexOf(dayName);
      const diff = targetDow - todayDow;
      const d = new Date(today);
      d.setDate(today.getDate() + diff);
      return d.toISOString().slice(0, 10);
    }

    function parseTimePart(s) {
      const m = s.trim().match(/^(\d+):(\d+)(am|pm)?$/i);
      if (!m) return null;
      let h = parseInt(m[1]);
      const min = parseInt(m[2]);
      const mer = m[3] ? m[3].toLowerCase() : null;
      if (mer === 'am') {
        if (h === 12) h = 0;
      } else if (mer === 'pm') {
        if (h !== 12) h += 12;
      } else {
        // Schedule runs 11am–11pm. 11 → 11am, 12 → noon, 1–10 → pm
        if (h !== 11 && h !== 12) h += 12;
      }
      return h * 60 + min;
    }

    function parseBlockTime(timeRange) {
      const parts = timeRange.split('–').map(s => s.trim());
      if (parts.length !== 2) return null;
      const start = parseTimePart(parts[0]);
      const end = parseTimePart(parts[1]);
      if (start === null || end === null || end <= start) return null;
      return { start, end, duration: (end - start) / 60 };
    }

    function fmtTime(mins) {
      const totalH = Math.floor(mins / 60);
      const m = mins % 60;
      const h = totalH % 12 === 0 ? 12 : totalH % 12;
      return `${h}:${String(m).padStart(2, '0')}${totalH < 12 ? 'am' : 'pm'}`;
    }

    function minutesToTimeString(start, end) {
      function fmt(mins) {
        const totalH = Math.floor(mins / 60);
        const m = mins % 60;
        const h = totalH % 12 === 0 ? 12 : totalH % 12;
        const mer = totalH < 12 ? 'am' : 'pm';
        return `${h}:${String(m).padStart(2, '0')}${mer}`;
      }
      const startH = Math.floor(start / 60);
      const endH = Math.floor(end / 60);
      const startMer = startH < 12 ? 'am' : 'pm';
      const endMer = endH < 12 ? 'am' : 'pm';
      function fmtNoMer(mins) {
        const totalH = Math.floor(mins / 60);
        const m = mins % 60;
        const h = totalH % 12 === 0 ? 12 : totalH % 12;
        return `${h}:${String(m).padStart(2, '0')}`;
      }
      const startStr = startMer === endMer ? fmtNoMer(start) : fmt(start);
      return `${startStr} \u2013 ${fmt(end)}`;
    }

    function weekKeyToMonday(weekKey) {
      const [yearStr, weekStr] = weekKey.split('-W');
      const year = parseInt(yearStr), week = parseInt(weekStr);
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4dow = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4dow - 1) + (week - 1) * 7);
      return monday;
    }

    function weekKeyToLabel(weekKey) {
      const monday = weekKeyToMonday(weekKey);
      return monday.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
    }

    // Migrate old check keys "Monday-0" → "Monday-b_0"; leave "Monday-cb_..." unchanged
    function migrateChecks(checksData) {
      if (!checksData) return {};
      const result = {};
      Object.entries(checksData).forEach(([k, v]) => {
        const lastDash = k.lastIndexOf('-');
        const suffix = k.slice(lastDash + 1);
        if (/^\d+$/.test(suffix)) {
          result[`${k.slice(0, lastDash)}-b_${suffix}`] = v;
        } else {
          result[k] = v;
        }
      });
      return result;
    }

    // Compute weekly summary from checks + dayBlocks (used for history archival)
    function computeWeekSummary(weekKey, checksData, dayBlocksData) {
      const monday = weekKeyToMonday(weekKey);
      const hours = {};
      legend.forEach(cat => hours[cat] = 0);
      let blocksCompleted = 0, totalBlocks = 0;
      days.forEach((dayName, dayIdx) => {
        const dayDate = new Date(monday);
        dayDate.setUTCDate(monday.getUTCDate() + dayIdx);
        const dateStr = dayDate.toISOString().slice(0, 10);
        const key = `${dateStr}-${dayName}`;
        const blocks = (dayBlocksData && dayBlocksData[key])
          || schedule[dayName].blocks.map((b, i) => ({ id: `b_${i}`, time: b.time, category: b.category }));
        blocks.forEach(block => {
          if (block.category === 'break') return;
          totalBlocks++;
          if (checksData && checksData[`${dayName}-${block.id}`]) {
            blocksCompleted++;
            const t = parseBlockTime(block.time);
            if (t && hours[block.category] !== undefined) hours[block.category] += t.duration;
          }
        });
      });
      return { weekOf: weekKeyToLabel(weekKey), hours, blocksCompleted, totalBlocks };
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const todayName = getTodayName();
      const weekKey = getWeekKey();

      const [activeDay, setActiveDay] = useState(todayName);
      const [nowMinutes, setNowMinutes] = useState(getCurrentMinutes());

      // checks: { "Monday-b_0": true, "Monday-cb_1710000000000": true }
      const [checks, setChecks] = useState(() => {
        try {
          const stored = localStorage.getItem(`schedule-checks-v1-${weekKey}`);
          if (stored) return JSON.parse(stored);
          // Migrate from old key format
          const old = localStorage.getItem(`schedule-v1-${weekKey}`);
          return old ? migrateChecks(JSON.parse(old)) : {};
        } catch { return {}; }
      });

      // dayBlocks: { "2026-03-19-Thursday": [{id, time, activity, detail, category, defaultActivity?, ...}] }
      const [dayBlocks, setDayBlocks] = useState(() => {
        try { return JSON.parse(localStorage.getItem('schedule-dayblocks-v1') || '{}'); } catch { return {}; }
      });

      const [history, setHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('schedule-history-v1') || '{}'); } catch { return {}; }
      });

      const [editingBlock, setEditingBlock] = useState(null); // { day, block, renderIdx }
      const [editingTime, setEditingTime] = useState(null);   // { day, block }
      const [addingBlock, setAddingBlock] = useState(null);   // { day }

      const [syncStatus, setSyncStatus] = useState(JSONBIN_BIN_ID ? 'loading' : 'unconfigured');
      const syncTimerRef = useRef(null);
      const dragState = useRef({ blockId: null, dayName: null });
      const justDropped = useRef(false);
      const [dragOverIdx, setDragOverIdx] = useState(null);

      useEffect(() => {
        const id = setInterval(() => setNowMinutes(getCurrentMinutes()), 60000);
        return () => clearInterval(id);
      }, []);

      // Fetch remote on mount
      useEffect(() => {
        if (!JSONBIN_BIN_ID) return;
        fetchRemote().then(remote => {
          if (!remote) { setSyncStatus('offline'); return; }
          let updatedChecks    = migrateChecks(remote.checks    || {});
          let updatedDayBlocks = remote.dayBlocks || {};
          let updatedHistory   = remote.history   || {};
          // Week rolled over since last sync — archive old week
          if (remote.weekKey && remote.weekKey !== weekKey) {
            const summary = computeWeekSummary(remote.weekKey, updatedChecks, updatedDayBlocks);
            updatedHistory = { ...updatedHistory, [remote.weekKey]: summary };
            updatedChecks = {};
            pushRemote({ weekKey, checks: updatedChecks, dayBlocks: updatedDayBlocks, history: updatedHistory });
          }
          setChecks(updatedChecks);
          setDayBlocks(updatedDayBlocks);
          setHistory(updatedHistory);
          setSyncStatus('synced');
          try {
            localStorage.setItem(`schedule-checks-v1-${weekKey}`, JSON.stringify(updatedChecks));
            localStorage.setItem('schedule-dayblocks-v1', JSON.stringify(updatedDayBlocks));
            localStorage.setItem('schedule-history-v1', JSON.stringify(updatedHistory));
          } catch {}
        }).catch(() => setSyncStatus('offline'));
      }, []);

      function schedulePush(newChecks, newDayBlocks, newHistory) {
        if (!JSONBIN_BIN_ID) return;
        if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
        setSyncStatus('syncing');
        syncTimerRef.current = setTimeout(async () => {
          try {
            await pushRemote({ weekKey, checks: newChecks, dayBlocks: newDayBlocks, history: newHistory });
            setSyncStatus('synced');
          } catch { setSyncStatus('error'); }
        }, 2000);
      }

      // Returns this day's block list. If never edited, initializes from hardcoded defaults.
      // Returned blocks always have: id, time, activity, detail, category
      // Hardcoded-origin blocks also have: defaultActivity, defaultCategory, defaultDetail
      function getDayBlocks(dayName) {
        const key = `${getDateForDay(dayName)}-${dayName}`;
        if (dayBlocks[key]) return dayBlocks[key];
        return schedule[dayName].blocks.map((b, i) => ({
          id: `b_${i}`,
          time: b.time,
          activity: b.activity,
          detail: b.detail,
          category: b.category,
          defaultActivity: b.activity,
          defaultCategory: b.category,
          defaultDetail: b.detail,
        }));
      }

      function saveDayBlocks(dayName, blocks) {
        const key = `${getDateForDay(dayName)}-${dayName}`;
        // Always keep sorted by start time
        const sorted = [...blocks].sort((a, b) => {
          const ta = parseBlockTime(a.time);
          const tb = parseBlockTime(b.time);
          return (ta ? ta.start : 0) - (tb ? tb.start : 0);
        });
        const next = { ...dayBlocks, [key]: sorted };
        setDayBlocks(next);
        try { localStorage.setItem('schedule-dayblocks-v1', JSON.stringify(next)); } catch {}
        schedulePush(checks, next, history);
      }

      function toggleCheck(dayName, blockId) {
        const key = `${dayName}-${blockId}`;
        const next = { ...checks };
        if (next[key]) { delete next[key]; } else { next[key] = true; }
        setChecks(next);
        try { localStorage.setItem(`schedule-checks-v1-${weekKey}`, JSON.stringify(next)); } catch {}
        schedulePush(next, dayBlocks, history);
      }

      // Apply a category override to a block — edits the block content directly
      function editBlockCategory(dayName, blockId, category, customText) {
        const blocks = getDayBlocks(dayName);
        const target = blocks.find(b => b.id === blockId);
        if (!target) return;
        const isCustomBlock = blockId.startsWith('cb_');
        let updates;
        if (category === 'misc') {
          updates = {
            category: 'misc',
            activity: customText || (isCustomBlock ? target.activity : 'Misc'),
            detail: target.detail,
          };
        } else {
          updates = {
            category,
            // Hardcoded blocks rename to category label; custom blocks keep their name
            activity: isCustomBlock ? target.activity : categoryLabels[category],
            detail: target.detail,
          };
        }
        const next = blocks.map(b => b.id === blockId ? { ...b, ...updates } : b);
        saveDayBlocks(dayName, next);
        setEditingBlock(null);
      }

      // Reset a hardcoded block back to its default content
      function resetBlock(dayName, blockId) {
        const blocks = getDayBlocks(dayName);
        const next = blocks.map(b => {
          if (b.id !== blockId) return b;
          return {
            ...b,
            category: b.defaultCategory,
            activity: b.defaultActivity,
            detail: b.defaultDetail,
          };
        });
        saveDayBlocks(dayName, next);
        setEditingBlock(null);
      }

      // Edit a block's time; adjacent blocks auto-adjust
      function editBlockTime(dayName, blockId, newStart, newEnd) {
        const blocks = getDayBlocks(dayName);
        // Find sorted position to identify neighbors
        const sorted = [...blocks].sort((a, b) => {
          const ta = parseBlockTime(a.time);
          const tb = parseBlockTime(b.time);
          return (ta ? ta.start : 0) - (tb ? tb.start : 0);
        });
        const idx = sorted.findIndex(b => b.id === blockId);
        const prevBlock = idx > 0 ? sorted[idx - 1] : null;
        const nextBlock = idx < sorted.length - 1 ? sorted[idx + 1] : null;

        let updated = blocks.map(b => {
          if (b.id === blockId) {
            if (newEnd <= newStart) return null;
            return { ...b, time: minutesToTimeString(newStart, newEnd) };
          }
          if (prevBlock && b.id === prevBlock.id) {
            const pt = parseBlockTime(b.time);
            if (!pt || newStart <= pt.start) return b; // no change
            const newEnd2 = newStart;
            if (newEnd2 <= pt.start) return null; // squeezed to zero
            return { ...b, time: minutesToTimeString(pt.start, newEnd2) };
          }
          if (nextBlock && b.id === nextBlock.id) {
            const nt = parseBlockTime(b.time);
            if (!nt || newEnd >= nt.end) return null; // squeezed to zero
            return { ...b, time: minutesToTimeString(newEnd, nt.end) };
          }
          return b;
        }).filter(Boolean);

        saveDayBlocks(dayName, updated);
      }

      // Add a new custom block, trimming any overlapping existing blocks
      function addBlock(dayName, newBlockData) {
        const { startMinutes: ns, endMinutes: ne, ...rest } = newBlockData;
        const blocks = getDayBlocks(dayName);
        const adjusted = blocks.map(b => {
          const t = parseBlockTime(b.time);
          if (!t) return b;
          const { start, end } = t;
          if (end <= ns || start >= ne) return b;          // no overlap
          if (start >= ns && end <= ne) return null;        // fully covered
          if (start < ns) return { ...b, time: minutesToTimeString(start, ns) }; // trim end
          return { ...b, time: minutesToTimeString(ne, end) };                    // trim start
        }).filter(Boolean);
        const newBlock = {
          id: `cb_${Date.now()}`,
          time: minutesToTimeString(ns, ne),
          ...rest,
        };
        saveDayBlocks(dayName, [...adjusted, newBlock]);
        setAddingBlock(null);
      }

      // Delete a block (any type)
      function deleteBlock(dayName, blockId) {
        const blocks = getDayBlocks(dayName);
        saveDayBlocks(dayName, blocks.filter(b => b.id !== blockId));
        setEditingBlock(null);
      }

      // Swap content (activity, detail, category) between two blocks; times stay fixed
      function swapBlockContents(dayName, idA, idB) {
        const blocks = getDayBlocks(dayName);
        const a = blocks.find(b => b.id === idA);
        const bBlk = blocks.find(b => b.id === idB);
        if (!a || !bBlk) return;
        const next = blocks.map(b => {
          if (b.id === idA) return { ...b, activity: bBlk.activity, detail: bBlk.detail, category: bBlk.category };
          if (b.id === idB) return { ...b, activity: a.activity, detail: a.detail, category: a.category };
          return b;
        });
        saveDayBlocks(dayName, next);
      }

      function getActualHours() {
        const actual = {};
        legend.forEach(cat => actual[cat] = 0);
        days.forEach(dayName => {
          getDayBlocks(dayName).forEach(block => {
            if (block.category === 'break') return;
            if (checks[`${dayName}-${block.id}`]) {
              const t = parseBlockTime(block.time);
              if (t && actual[block.category] !== undefined) actual[block.category] += t.duration;
            }
          });
        });
        return actual;
      }

      const actualHours = getActualHours();
      const day = schedule[activeDay] || schedule[todayName];
      const totalBlocks = days.reduce((sum, d) =>
        sum + getDayBlocks(d).filter(b => b.category !== 'break').length, 0);
      const completedBlocks = Object.keys(checks).length;

      return (
        <div className="min-h-screen bg-zinc-950 p-6">

          {/* Header */}
          <div className="max-w-3xl mx-auto mb-10">
            <p className="text-zinc-500 text-xs tracking-widest uppercase mb-1">Weekly Structure</p>
            <h1 className="text-4xl font-bold text-zinc-100 mb-1">Adi's Schedule</h1>
            <p className="text-zinc-400 text-base">Pre-April LSAT · Active Job Search · 11am – 11pm</p>
            <div className="flex flex-wrap gap-3 mt-5">
              {legend.map(cat => (
                <div key={cat} className="flex items-center gap-1.5">
                  <div className={`w-2\.5 h-2\.5 rounded-full ${categoryColors[cat].accent}`} />
                  <span className="text-zinc-400 text-xs tracking-wide">{categoryLabels[cat]}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Day Tabs + Sync Indicator */}
          <div className="max-w-3xl mx-auto mb-8">
            <div className="flex flex-wrap gap-1 items-center">
              {days.map(d => (
                <button
                  key={d}
                  onClick={() => setActiveDay(d)}
                  className={`px-3 py-1\.5 text-sm rounded transition-all ${activeDay === d ? "active-day" : "inactive-day"}`}
                  style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', lineHeight: '1.4' }}
                >
                  {d.slice(0, 3)}
                  {d === todayName && (
                    <span style={{
                      display: 'block', width: '4px', height: '4px', borderRadius: '50%',
                      background: activeDay === d ? '#71717a' : '#fbbf24',
                      margin: '3px auto 0',
                    }} />
                  )}
                </button>
              ))}
              <button
                onClick={() => setActiveDay('History')}
                className={`px-3 py-1\.5 text-sm rounded transition-all ${activeDay === 'History' ? "active-day" : "inactive-day"}`}
              >
                Hist
              </button>
              <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center' }}>
                {syncStatus === 'unconfigured' && <span style={{ fontSize: '10px', color: '#3f3f46', fontFamily: 'monospace' }}>sync off</span>}
                {syncStatus === 'loading'      && <span style={{ fontSize: '10px', color: '#71717a', fontFamily: 'monospace' }}>⊙ loading</span>}
                {syncStatus === 'syncing'      && <span style={{ fontSize: '10px', color: '#fbbf24', fontFamily: 'monospace' }}>⊙ syncing…</span>}
                {syncStatus === 'synced'       && <span style={{ fontSize: '10px', color: '#34d399', fontFamily: 'monospace' }}>✓ synced</span>}
                {syncStatus === 'offline'      && <span style={{ fontSize: '10px', color: '#71717a', fontFamily: 'monospace' }}>○ offline</span>}
                {syncStatus === 'error'        && <span style={{ fontSize: '10px', color: '#fb7185', fontFamily: 'monospace' }}>✗ error</span>}
              </div>
            </div>
          </div>

          {/* History View */}
          {activeDay === 'History' && (
            <div className="max-w-3xl mx-auto">
              <div className="mb-6">
                <h2 className="text-2xl font-bold text-zinc-100">History</h2>
                <p className="text-zinc-500 text-sm mt-0\.5 italic">Past weeks' completion</p>
              </div>
              {Object.keys(history).length === 0 ? (
                <p className="text-zinc-500 text-sm italic">No history yet — complete your first week to see it here.</p>
              ) : (
                <div className="space-y-3">
                  {Object.keys(history).sort().reverse().map(wk => {
                    const s = history[wk];
                    return (
                      <div key={wk} className="rounded-lg border border-zinc-800 bg-zinc-900 px-5 py-4">
                        <div className="flex items-baseline justify-between mb-4">
                          <p className="text-zinc-100 font-semibold text-base">Week of {s.weekOf}</p>
                          <p className="text-zinc-500 text-xs font-mono">{s.blocksCompleted} / {s.totalBlocks} blocks</p>
                        </div>
                        <div className="grid grid-cols-2 md-grid-cols-6 gap-3">
                          {legend.map(cat => {
                            const c = categoryColors[cat];
                            const hex = categoryAccentHex[cat];
                            const actual = Math.round((s.hours[cat] || 0) * 10) / 10;
                            const target = weeklyTargets[cat];
                            const pct = Math.min(actual / target, 1);
                            return (
                              <div key={cat} className={`rounded border ${c.border} ${c.bg} px-3 py-2`}>
                                <p className={`text-xs font-semibold ${c.text} mb-1`}>{categoryLabels[cat]}</p>
                                <p className="text-zinc-300 text-sm font-mono">
                                  {actual} <span className="text-zinc-600">/ {target} hrs</span>
                                </p>
                                <div className="progress-track">
                                  <div className="progress-fill" style={{ width: `${pct * 100}%`, background: hex }} />
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Day View */}
          {activeDay !== 'History' && (
            <div className="max-w-3xl mx-auto">
              <div className="mb-6">
                <h2 className="text-2xl font-bold text-zinc-100">
                  {activeDay}
                  {activeDay === todayName && (
                    <span style={{
                      fontSize: '11px', fontWeight: 400, color: '#71717a',
                      marginLeft: '10px', fontFamily: 'monospace',
                      textTransform: 'uppercase', letterSpacing: '0.06em',
                    }}>today</span>
                  )}
                </h2>
                <p className="text-zinc-500 text-sm mt-0\.5 italic">{schedule[activeDay].theme}</p>
              </div>

              <div className="space-y-3">
                {getDayBlocks(activeDay).map((block, renderIdx) => {
                  const isCustom = block.id.startsWith('cb_');
                  const isBreak = block.category === 'break';
                  const isChecked = !!checks[`${activeDay}-${block.id}`];
                  const blockTime = parseBlockTime(block.time);
                  const isNow = activeDay === todayName && blockTime && nowMinutes >= blockTime.start && nowMinutes < blockTime.end;
                  const isOverridden = !isCustom && block.defaultCategory !== undefined && (
                    block.category !== block.defaultCategory || block.activity !== block.defaultActivity
                  );
                  const c = categoryColors[block.category] || categoryColors.misc;
                  const hex = categoryAccentHex[block.category] || categoryAccentHex.misc;
                  const isDragOver = !isBreak && dragOverIdx === block.id;

                  return (
                    <div
                      key={block.id}
                      draggable={!isBreak}
                      className={`block-card rounded-lg border ${c.border} ${c.bg} px-5 py-4 flex items-start gap-4${isDragOver ? ' drag-over' : ''}`}
                      onDragStart={!isBreak ? () => { dragState.current = { blockId: block.id, dayName: activeDay }; } : undefined}
                      onDragOver={!isBreak ? (e => {
                        e.preventDefault();
                        if (dragState.current.blockId !== block.id) setDragOverIdx(block.id);
                      }) : undefined}
                      onDragLeave={!isBreak ? () => setDragOverIdx(null) : undefined}
                      onDrop={!isBreak ? (e => {
                        e.preventDefault();
                        setDragOverIdx(null);
                        const { blockId: srcId, dayName: srcDay } = dragState.current;
                        if (srcId && srcId !== block.id && srcDay === activeDay) {
                          swapBlockContents(activeDay, srcId, block.id);
                        }
                        dragState.current = { blockId: null, dayName: null };
                        justDropped.current = true;
                        setTimeout(() => { justDropped.current = false; }, 100);
                      }) : undefined}
                      onDragEnd={!isBreak ? () => { setDragOverIdx(null); dragState.current = { blockId: null, dayName: null }; } : undefined}
                      onClick={() => {
                        if (justDropped.current) return;
                        if (!isBreak) setEditingBlock({ day: activeDay, block, renderIdx });
                      }}
                      style={{
                        opacity: isChecked ? 0.42 : 1,
                        boxShadow: isNow ? `0 0 0 1px ${hex}70, inset 0 0 40px ${hex}0a` : 'none',
                        cursor: isBreak ? 'default' : undefined,
                      }}
                    >
                      <div className="mt-1\.5 flex-shrink-0">
                        <div className={`w-2 h-2 rounded-full ${c.accent}`} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-baseline justify-between gap-2 flex-wrap">
                          <span className={`text-base font-semibold ${c.text}`} style={{ textDecoration: isChecked ? 'line-through' : 'none', textDecorationColor: 'rgba(255,255,255,0.25)' }}>
                            {block.activity}
                            {isNow && <span className="now-badge" style={{ background: hex }}>NOW</span>}
                            {isCustom && <span style={{ fontSize: '10px', color: '#52525b', marginLeft: '8px', fontFamily: 'monospace', fontWeight: 400 }}>+ added</span>}
                            {isOverridden && <span style={{ fontSize: '10px', color: '#52525b', marginLeft: '8px', fontFamily: 'monospace', fontWeight: 400 }}>↺ was {block.defaultActivity}</span>}
                          </span>
                          <span className="text-zinc-500 text-xs font-mono">{block.time}</span>
                        </div>
                        <p className="text-zinc-300 text-sm mt-0\.5">{block.detail}</p>
                      </div>
                      {!isBreak && (
                        <button
                          onClick={e => { e.stopPropagation(); toggleCheck(activeDay, block.id); }}
                          title={isChecked ? "Mark incomplete" : "Mark done"}
                          style={{ width: '24px', height: '24px', borderRadius: '50%', flexShrink: 0, marginTop: '1px', border: isChecked ? 'none' : '1.5px solid rgba(100,100,110,0.45)', background: isChecked ? hex : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s ease', fontSize: '12px', color: '#09090b', fontWeight: 700, lineHeight: 1 }}
                        >
                          {isChecked && '✓'}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Add block button */}
              <button
                onClick={() => setAddingBlock({ day: activeDay })}
                style={{ width: '100%', marginTop: '8px', padding: '10px', borderRadius: '8px', border: '1px dashed rgba(255,255,255,0.12)', background: 'transparent', color: '#52525b', fontSize: '13px', cursor: 'pointer', fontFamily: 'Georgia, serif', transition: 'all 0.15s ease' }}
                onMouseEnter={e => { e.target.style.borderColor = 'rgba(255,255,255,0.25)'; e.target.style.color = '#a1a1aa'; }}
                onMouseLeave={e => { e.target.style.borderColor = 'rgba(255,255,255,0.12)'; e.target.style.color = '#52525b'; }}
              >
                + Add block
              </button>

              {activeDay === "Saturday" && (
                <div className="mt-6 rounded-lg border border-amber-400-20 bg-amber-950-30 px-5 py-4">
                  <p className="text-amber-300-80 text-sm italic">Saturday is the most important LSAT day of the week. Treat it like the real test — same time of day, no phone, no music. Review happens Sunday when you're fresh.</p>
                </div>
              )}
              {activeDay === "Sunday" && (
                <div className="mt-6 rounded-lg border border-zinc-700-40 bg-zinc-900 px-5 py-4">
                  <p className="text-zinc-400 text-sm italic">Sunday does double duty — test review in the morning while it's fresh enough to be useful but distant enough to not feel brutal, then a proper weekly reset. The review and weekly planning are the two non-negotiables; everything else is flex.</p>
                </div>
              )}
            </div>
          )}

          {/* Weekly Scoreboard */}
          <div className="max-w-3xl mx-auto mt-12 border-t border-zinc-800 pt-8">
            <div className="flex items-baseline justify-between mb-4">
              <p className="text-zinc-500 text-xs uppercase tracking-widest">This week's progress</p>
              <p className="text-zinc-600 text-xs font-mono">{completedBlocks} / {totalBlocks} blocks done</p>
            </div>
            <div className="grid grid-cols-2 md-grid-cols-6 gap-3">
              {legend.map(cat => {
                const c = categoryColors[cat];
                const hex = categoryAccentHex[cat];
                const actual = Math.round(actualHours[cat] * 10) / 10;
                const target = weeklyTargets[cat];
                const pct = Math.min(actual / target, 1);
                return (
                  <div key={cat} className={`rounded-lg border ${c.border} ${c.bg} px-4 py-3`}>
                    <p className={`text-xs font-semibold ${c.text} mb-1`}>{categoryLabels[cat]}</p>
                    <p className="text-zinc-300 text-sm font-mono">
                      {actual} <span className="text-zinc-600">/ {target} hrs</span>
                    </p>
                    <div className="progress-track">
                      <div className="progress-fill" style={{ width: `${pct * 100}%`, background: hex }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <p className="max-w-3xl mx-auto mt-8 text-zinc-600 text-xs">
            Tap any block to swap it out. Everything except Saturday's practice test is flexible — the structure matters more than the exact times.
          </p>

          {/* Override Modal */}
          {editingBlock && (
            <OverrideModal
              block={editingBlock.block}
              dayName={editingBlock.day}
              onApply={editBlockCategory}
              onReset={resetBlock}
              onDelete={() => deleteBlock(editingBlock.day, editingBlock.block.id)}
              onEditTime={() => {
                setEditingTime({ day: editingBlock.day, block: editingBlock.block });
                setEditingBlock(null);
              }}
              onClose={() => setEditingBlock(null)}
            />
          )}

          {/* Edit Time Modal */}
          {editingTime && (
            <EditTimeModal
              block={editingTime.block}
              dayName={editingTime.day}
              onSave={editBlockTime}
              onClose={() => setEditingTime(null)}
            />
          )}

          {/* Add Block Modal */}
          {addingBlock && (
            <AddBlockModal
              dayName={addingBlock.day}
              onSave={addBlock}
              onClose={() => setAddingBlock(null)}
            />
          )}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
